name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Light gate
        run: pnpm ci:light

      - name: Extended gate
        if: github.event_name == 'pull_request'
        run: pnpm ci:extended

      - name: Full gate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm ci:full
